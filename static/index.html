<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campaign Image Generator</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --accent: #6d5efc;
    --accent-hover: #5647e0;
    --text: #e8e9ed;
    --muted: #9aa0ac;
    --border: #2a2e38;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    overflow-y: auto;
    max-height: 100vh;
  }
  .sidebar h2 {
    font-size: 0.95rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 16px 4px;
  }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .thumb-row {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .history-item img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 6px;
  }
  .history-item .prompt-text {
    font-size: 0.8rem;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .history-item .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }
  .history-item .timestamp {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .history-item .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 6px;
  }
  .history-item .delete-btn:hover { color: #ff6b6b; }
  .empty-history {
    color: var(--muted);
    font-size: 0.85rem;
    padding: 8px 4px;
  }

  .main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 40px 24px;
    overflow-y: auto;
  }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 28px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  textarea {
    width: 100%;
    min-height: 90px;
    background: #10131a;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font-size: 0.95rem;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }
  .variation-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .variation-control button {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #10131a;
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    margin: 0;
  }
  .variation-control span {
    font-size: 0.95rem;
    min-width: 16px;
    text-align: center;
  }

  button.generate-btn {
    margin-top: 16px;
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button.generate-btn:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .status { margin-top: 16px; font-size: 0.9rem; color: var(--muted); min-height: 20px; }
  .status.error { color: #ff6b6b; }

  .result-grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .result-grid figure { margin: 0; }
  .result-grid img {
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
  }
  .result-grid figcaption {
    text-align: center;
    margin-top: 6px;
  }
  .result-grid a {
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<aside class="sidebar">
  <h2>History</h2>
  <div id="historyList"></div>
</aside>

<div class="main">
  <div class="container">
    <h1>🎨 Campaign Image Generator</h1>
    <p class="subtitle">Describe a campaign image and generate variations with FLUX.1-schnell</p>

    <div class="card">
      <label for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="e.g. A vibrant summer sale poster with tropical fruit, bold typography, orange and teal palette"></textarea>

      <div class="row">
        <div class="variation-control">
          <label style="margin:0;">Variations</label>
          <button onclick="changeVariations(-1)">−</button>
          <span id="variationCount">1</span>
          <button onclick="changeVariations(1)">+</button>
        </div>
      </div>

      <button id="generateBtn" class="generate-btn" onclick="generateImage()">Generate</button>

      <div id="status" class="status"></div>
      <div id="resultGrid" class="result-grid"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = ""; // same-origin: frontend and backend are served together
let variations = 1;
const MAX_VARIATIONS = 4;

function changeVariations(delta) {
  variations = Math.min(MAX_VARIATIONS, Math.max(1, variations + delta));
  document.getElementById("variationCount").textContent = variations;
}

function renderImagesInto(container, images) {
  container.innerHTML = "";
  images.forEach((img, i) => {
    const fig = document.createElement("figure");
    const image = document.createElement("img");
    image.src = `data:${img.content_type};base64,${img.image_base64}`;
    fig.appendChild(image);

    const caption = document.createElement("figcaption");
    const link = document.createElement("a");
    link.href = image.src;
    link.download = `campaign-image-${i + 1}.jpg`;
    link.textContent = "Download";
    caption.appendChild(link);
    fig.appendChild(caption);

    container.appendChild(fig);
  });
}

async function generateImage() {
  const promptEl = document.getElementById("prompt");
  const statusEl = document.getElementById("status");
  const resultGrid = document.getElementById("resultGrid");
  const btn = document.getElementById("generateBtn");

  const prompt = promptEl.value.trim();
  if (!prompt) {
    statusEl.textContent = "Please enter a prompt first.";
    statusEl.className = "status error";
    return;
  }

  btn.disabled = true;
  resultGrid.innerHTML = "";
  statusEl.className = "status";
  statusEl.innerHTML = `<span class="spinner"></span>Generating ${variations} image(s), this can take a while...`;

  try {
    const response = await fetch(`${API_BASE}/api/v1/generate-campaign`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, num_variations: variations }),
    });
    const data = await response.json();

    if (data.status === "success") {
      statusEl.textContent = data.failed_count > 0
        ? `Done, but ${data.failed_count} variation(s) failed.`
        : "Done!";
      renderImagesInto(resultGrid, data.images);
      loadHistory();
    } else {
      statusEl.className = "status error";
      statusEl.textContent = data.message || "Something went wrong.";
    }
  } catch (err) {
    statusEl.className = "status error";
    statusEl.textContent = `Request failed: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

async function loadHistory() {
  const listEl = document.getElementById("historyList");
  try {
    const response = await fetch(`${API_BASE}/api/v1/history`);
    const data = await response.json();

    if (data.status !== "success" || data.history.length === 0) {
      listEl.innerHTML = '<div class="empty-history">No generations yet.</div>';
      return;
    }

    listEl.innerHTML = "";
    data.history.forEach((entry) => {
      const item = document.createElement("div");
      item.className = "history-item";

      const thumbRow = document.createElement("div");
      thumbRow.className = "thumb-row";
      entry.images.slice(0, 3).forEach((img) => {
        const thumb = document.createElement("img");
        thumb.src = `data:${img.content_type};base64,${img.image_base64}`;
        thumbRow.appendChild(thumb);
      });
      item.appendChild(thumbRow);

      const promptText = document.createElement("div");
      promptText.className = "prompt-text";
      promptText.textContent = entry.prompt;
      item.appendChild(promptText);

      const metaRow = document.createElement("div");
      metaRow.className = "meta-row";

      const timestamp = document.createElement("span");
      timestamp.className = "timestamp";
      const date = new Date(entry.created_at);
      timestamp.textContent = date.toLocaleString();
      metaRow.appendChild(timestamp);

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "Delete";
      deleteBtn.onclick = async (e) => {
        e.stopPropagation();
        await fetch(`${API_BASE}/api/v1/history/${entry.id}`, { method: "DELETE" });
        loadHistory();
      };
      metaRow.appendChild(deleteBtn);

      item.appendChild(metaRow);

      item.onclick = () => {
        document.getElementById("prompt").value = entry.prompt;
        renderImagesInto(document.getElementById("resultGrid"), entry.images);
        document.getElementById("status").textContent = "Loaded from history.";
        document.getElementById("status").className = "status";
      };

      listEl.appendChild(item);
    });
  } catch (err) {
    listEl.innerHTML = '<div class="empty-history">Could not load history.</div>';
  }
}

loadHistory();
</script>
</body>
</html>
